<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档阅读器 - Java 面试备战</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .reader-content {
            white-space: pre-wrap;
            font-family: 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="back-btn">← 返回目录</a>
        <h1>文档阅读器</h1>
    </nav>

    <main class="main-content" style="margin-left: 0;">
        <article class="content">
            <div style="background: #f0f0f0; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <p style="color: #666; margin: 0;">
                    此页面可直接渲染 Markdown 内容。请在下方粘贴文档内容，点击渲染按钮查看格式化效果。
                </p>
            </div>

            <textarea id="markdown-input" style="width: 100%; height: 300px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 14px;" placeholder="粘贴 Markdown 内容..."></textarea>

            <button onclick="renderMarkdown()" style="margin-top: 15px; padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px;">
                渲染文档
            </button>

            <div id="rendered-content" style="margin-top: 30px;"></div>
        </article>
    </main>

    <script>
        // 简单的 Markdown 渲染器
        function renderMarkdown() {
            var input = document.getElementById('markdown-input').value;
            var output = document.getElementById('rendered-content');

            var html = parseMarkdown(input);
            output.innerHTML = html;
        }

        function parseMarkdown(text) {
            // 处理标题
            text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');

            // 处理代码块
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

            // 处理行内代码
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 处理粗体
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // 处理斜体
            text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 处理分隔线
            text = text.replace(/^---+$/gm, '<hr>');

            // 处理引用
            text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            // 处理表格（简化处理）
            text = text.replace(/\|(.+)\|\n\|[-:|]+\|\n((?:\|.+\|\n?)+)/g, function(match) {
                var lines = match.trim().split('\n');
                var html = '<table><thead><tr>';

                // 表头
                var headers = lines[0].split('|').filter(function(h) { return h.trim(); });
                headers.forEach(function(h) {
                    html += '<th>' + h.trim() + '</th>';
                });
                html += '</tr></thead><tbody>';

                // 表体（跳过分隔行）
                for (var i = 2; i < lines.length; i++) {
                    var cells = lines[i].split('|').filter(function(c) { return c.trim(); });
                    html += '<tr>';
                    cells.forEach(function(c) {
                        html += '<td>' + c.trim() + '</td>';
                    });
                    html += '</tr>';
                }

                html += '</tbody></table>';
                return html;
            });

            // 处理列表
            text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
            text = text.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');

            // 包装连续的 li 为 ul
            text = text.replace(/(<li>.*<\/li>\n?)+/g, function(match) {
                return '<ul>' + match + '</ul>';
            });

            // 处理段落
            var paragraphs = text.split(/\n\n+/);
            paragraphs = paragraphs.map(function(p) {
                if (p.trim() && !p.match(/^<[huptob]/)) {
                    return '<p>' + p.trim() + '</p>';
                }
                return p;
            });

            return paragraphs.join('\n\n');
        }

        // 从 URL 参数加载文件
        window.onload = function() {
            var params = new URLSearchParams(window.location.search);
            var file = params.get('file');
            if (file) {
                loadFile(file);
            }
        };

        function loadFile(filename) {
            // 这里可以扩展为从服务器加载文件
            document.getElementById('markdown-input').value = '加载文件: ' + filename + '\n\n请手动粘贴文件内容...';
        }
    </script>
</body>
</html>
